<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simon</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="css/style.css" type="text/css" />
</head>

<body>
  <div class="d-flex vh-100 w-50 m-auto d-flex justify-content-center align-items-center flex-column">
    <!-- Countdown -->
    <div id="countdown" class="fs-1 fw-bolder"></div>
    <p id="instructions">Memorizza i numeri entro il tempo limite!</p>
    <button class="btn btn-primary mt-2 d-block mx-auto" id="letsPlay">Gioca ora!</button>

    <!-- Numbers -->
    <ul id="numbers-list" class="d-flex gap-5 list-unstyled"></ul>

    <!-- Form -->
    <form id="answers-form" class="d-none">
      <div class="d-flex gap-5" id="input-group">
        <input type="number" class="form-control" min="1" max="50" required>
        <input type="number" class="form-control" min="1" max="50" required>
        <input type="number" class="form-control" min="1" max="50" required>
        <input type="number" class="form-control" min="1" max="50" required>
        <input type="number" class="form-control" min="1" max="50" required>
      </div>
      <button class="btn btn-primary mt-2 d-block mx-auto" id="btnConferma">Avanti</button>
      <button class="btn btn-primary mt-2 d-block mx-auto d-none" id="btnRisposta">Conferma</button>
      <p class="text-danger text-center" id="message"></p>
    </form>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="js/functions.js"></script>
  <script src="js/script.js"></script>
</body>

</html>
